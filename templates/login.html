<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <title>Portal Login // Biometric Register</title>
    <style>
        body {
            background: linear-gradient(135deg, #0F3D1D 0%, #1E5631 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border: none;
            max-width: 440px;
            width: 100%;
        }

        .brand-header {
            background: #1E5631;
            padding: 2.5rem 2rem 2rem 2rem;
            position: relative;
            text-center: center;
        }

        /* Diagonal Accent Slice */
        .brand-header::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 0;
            width: 100%;
            height: 40px;
            background: rgba(255, 255, 255, 0.98);
            transform: skewY(-3deg);
        }

        .school-logo-icon {
            width: 64px;
            height: 64px;
            background: #E25822;
            color: white;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 1rem auto;
            box-shadow: 0 8px 16px rgba(226, 88, 34, 0.3);
        }

        .form-control {
            border: 2px solid #E5E7EB;
            padding: 0.75rem 1rem 0.75rem 2.8rem;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: #1E5631;
            box-shadow: 0 0 0 4px rgba(30, 86, 49, 0.1);
        }

        .input-group-custom {
            position: relative;
        }

        .input-group-custom i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
            font-size: 1.1rem;
            z-index: 10;
        }

        .btn-login {
            background: #E25822;
            color: white;
            font-weight: 700;
            padding: 0.85rem;
            border-radius: 12px;
            border: none;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(226, 88, 34, 0.25);
        }

        .btn-login:hover {
            background: #C0390B;
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(226, 88, 34, 0.35);
            color: white;
        }

        .alert-custom {
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center px-3">
        <div class="card login-card shadow">
            
            <div class="brand-header text-center">
                <div class="school-logo-icon">
                    <i class="bi bi-fingerprint"></i>
                </div>
                <h4 class="text-white fw-bold mb-1" style="letter-spacing: 0.5px;">SECURE SCHOOL PORTAL</h4>
                <p class="text-white-50 m-0 small text-uppercase fw-semibold" style="letter-spacing: 1px;">Biometric Register Terminal</p>
            </div>

            <div class="card-body p-4 pt-5">
                
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for cat, msg in messages %}
                            <div class="alert alert-danger alert-custom text-center py-2.5 mb-4 border-0 shadow-sm" role="alert">
                                <i class="bi bi-exclamation-circle-fill me-2"></i> {{ msg }}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="POST" action="/">
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-secondary text-uppercase tracking-wider">Staff Username</label>
                        <div class="input-group-custom">
                            <i class="bi bi-person-circle"></i>
                            <input type="text" name="username" class="form-control" placeholder="Enter 'teacher'" required autocomplete="off">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold text-secondary text-uppercase tracking-wider">Portal Password</label>
                        <div class="input-group-custom">
                            <i class="bi bi-shield-lock"></i>
                            <input type="password" name="password" class="form-control" placeholder="Enter 'school123'" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-login w-100 text-uppercase mt-2">
                        Log In <i class="bi bi-arrow-right-short ms-1 fs-5 align-middle"></i>
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted small mb-0">System Version 2.4.0 (Active)</p>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
